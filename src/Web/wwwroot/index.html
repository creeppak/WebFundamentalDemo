<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Stock Trader</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="128x128" href="favicon-128.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
</head>

<body>
    <div id="app">
        <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;">
            <div style="width:400px;height:8px;background-color:#e0e0e0;border-radius:3px;overflow:hidden;">
                <div id="loading-bar-fill" style="height:100%;width:0%;background-color:#1976d2;border-radius:10px;transition:width 0.05s ease-in-out;"></div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            function update() {
                var fill = document.getElementById('loading-bar-fill');
                if (!fill) return;
                var pct = getComputedStyle(document.documentElement).getPropertyValue('--blazor-load-percentage').trim();
                if (pct) fill.style.width = pct;
                requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        })();
    </script>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
