server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Route all requests through index.html for Blazor WASM client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Blazor publish output uses content-hash filenames — cache aggressively.
    location ~* \.(js|wasm|dat|gz|br)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entry point or appsettings (runtime config injection).
    location ~* \.(html|json)$ {
        expires off;
        add_header Cache-Control "no-store";
    }
}
